# /etc/strongswan/swanctl/conf.d/ikev2-hostname.conf
connections {
    pubkey-eaptls {
        version = 2
        pools = pool-ipv4
        local {
            auth = pubkey
            certs = le-ikev2-srv.crt
            id = hostname.menoscero.com
        }
        remote {
            auth = eap-tls
            eap_id = %any
        }
        children {
            tunnel-ubbnet {
                local_ts = dynamic, 0.0.0.0/0, 2000::/3
                mode = tunnel
            }
        }
    }
}
pools {
    pool-ipv4 {
        addrs = 192.168.123.0/24
        dns = 1.1.1.1, 8.8.8.8, 9.9.9.9
    }
}
